{% load static thumbnail %}
<div class="hero">
  <div class="hero-logo">
    {% if obj.url %}<a href="{{ obj.url }}" rel="nofollow">{% endif %}
    <img src="{% if obj.logo %}{{ obj.thumbnail.url }}{% else %}{% static 'img/fundraising-heart.svg' %}{% endif %}"
         loading="lazy" alt="{{ obj.display_name }}" />
    {% if obj.url %}</a>{% endif %}
  </div>
  <div class="hero-name">
    {% if obj.url %}<a href="{{ obj.url }}" rel="nofollow">{% endif %}{% spaceless %}
      {{ obj.display_name }}
    {% endspaceless %}{% if obj.url %}</a>{% endif %}
    {% if show_description %}{{ obj.description }}{% endif %}
  </div>
</div>
